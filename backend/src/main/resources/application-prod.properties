# =========================================================
# Logging
# =========================================================
logging.level.ROOT=INFO
logging.level.tech.jhipster=INFO
logging.level.cabs=INFO

# =========================================================
# Management
# =========================================================
management.prometheus.metrics.export.enabled=false

# =========================================================
# Spring DevTools
# =========================================================
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# =========================================================
# Datasource
# =========================================================
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.url=jdbc:mysql://cabs.c9am6s0scep0.ap-southeast-1.rds.amazonaws.com:3306/cabs?useUnicode=true&characterEncoding=utf8&useSSL=false&useLegacyDatetimeCode=false&createDatabaseIfNotExist=true
spring.datasource.username=admin
# TODO: encrypt pw using jasypt
spring.datasource.password=Passw0rd12345

spring.datasource.hikari.poolName=Hikari
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
spring.datasource.hikari.data-source-properties.useServerPrepStmts=true

# =========================================================
# Mail
# =========================================================
spring.mail.host=localhost
spring.mail.port=25

# =========================================================
# Thymeleaf
# =========================================================
spring.thymeleaf.cache=true

# =========================================================
# Server
# =========================================================
server.shutdown=graceful

server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,application/javascript,application/json,image/svg+xml
server.compression.min-response-size=1024

# =========================================================
# JHipster Cache
# =========================================================
jhipster.http.cache.timeToLiveInDays=1461

jhipster.cache.ehcache.time-to-live-seconds=3600
jhipster.cache.ehcache.max-entries=1000

