# Logging
logging.level.ROOT=INFO
logging.level.tech.jhipster=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.cabs=INFO

# Devtools
spring.devtools.restart.enabled=true
spring.devtools.restart.additional-exclude=static/**
spring.devtools.livereload.enabled=false

# Jackson
spring.jackson.serialization.indent-output=true

# Datasource
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.url=jdbc:mysql://localhost:3306/cabs?useUnicode=true&characterEncoding=utf8&useSSL=false&useLegacyDatetimeCode=false&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Passw0rd12345

spring.datasource.hikari.poolName=Hikari
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
spring.datasource.hikari.data-source-properties.useServerPrepStmts=true

# Liquibase
spring.liquibase.enabled=true
spring.liquibase.default-schema=cabs
spring.liquibase.user=root
spring.liquibase.password=Passw0rd12345
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# Mail
spring.mail.host=localhost
spring.mail.port=25

# Messages
spring.messages.cache-duration=PT1S

# Thymeleaf
spring.thymeleaf.cache=false

# Server
server.port=8080

# JHipster cache
jhipster.cache.ehcache.time-to-live-seconds=3600
jhipster.cache.ehcache.max-entries=100

# CORS
jhipster.cors.allowed-origins=http://localhost:8100,https://localhost:8100,http://localhost:9000,https://localhost:9000,http://localhost:4200,https://localhost:4200
jhipster.cors.allowed-origin-patterns=https://*.githubpreview.dev
jhipster.cors.allowed-methods=*
jhipster.cors.allowed-headers=*
jhipster.cors.exposed-headers=Authorization,Link,X-Total-Count,X-${jhipster.clientApp.name}-alert,X-${jhipster.clientApp.name}-error,X-${jhipster.clientApp.name}-params
jhipster.cors.allow-credentials=true
jhipster.cors.max-age=1800

# JWT
jhipster.security.authentication.jwt.base64-secret=ODI3ZDg3M2IwNGM1NGQ1ZGI5MTE1YWU2ODEzMGM3NGExMTNiNGZiODRhZTQ4Mzg1NjRhZjUwMDYzODU4Nzc4YWFhZjI3ZGEyYWY1Yjc1ODAyMzE1MzNmNzUwZmUyODliNmZhMTBlNGJmYzExMGY1MTdhNmVmZGJiOTA1OGFiZDk=
jhipster.security.authentication.jwt.token-validity-in-seconds=86400
jhipster.security.authentication.jwt.token-validity-in-seconds-for-remember-me=2592000

# JHipster mail
jhipster.mail.base-url=http://127.0.0.1:8080

# Logging
jhipster.logging.use-json-format=false
jhipster.logging.logstash.enabled=false
jhipster.logging.logstash.host=localhost
jhipster.logging.logstash.port=5000
jhipster.logging.logstash.ring-buffer-size=512