# =========================================================
# Profile activation (default)
# =========================================================
spring.profiles.active=local
# Server
server.port=8082

# =========================================================
# Disable springdoc when NOT api-docs profile
# =========================================================
spring.config.activate.on-profile=!api-docs
spring.liquibase.enabled=false
springdoc.api-docs.enabled=false

# =========================================================
# Management endpoints
# =========================================================
management.endpoints.web.base-path=/management
management.endpoints.web.exposure.include=configprops,env,health,info,jhimetrics,jhiopenapigroups,logfile,loggers,prometheus,threaddump,caches,liquibase

management.endpoint.health.show-details=when_authorized
management.endpoint.health.roles=ROLE_ADMIN
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState,db

management.endpoint.jhimetrics.enabled=true

management.info.git.mode=full
management.info.env.enabled=true

management.health.mail.enabled=false

management.prometheus.metrics.export.enabled=true
management.prometheus.metrics.export.step=60

management.observations.key-values.application=${spring.application.name}

management.metrics.enable.http=true
management.metrics.enable.jvm=true
management.metrics.enable.logback=true
management.metrics.enable.process=true
management.metrics.enable.system=true

management.metrics.distribution.percentiles-histogram.all=true
management.metrics.distribution.percentiles.all=0,0.5,0.75,0.95,0.99,1.0

management.metrics.data.repository.autotime.enabled=true

# =========================================================
# Spring core
# =========================================================
spring.application.name=cabs

spring.profiles.group.local=local

spring.jmx.enabled=false

spring.data.jpa.repositories.bootstrap-mode=deferred

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.timezone.default_storage=NORMALIZE
spring.jpa.properties.hibernate.type.preferred_instant_jdbc_type=TIMESTAMP
spring.jpa.properties.hibernate.id.new_generator_mappings=true
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true
spring.jpa.properties.hibernate.cache.use_second_level_cache=true
spring.jpa.properties.hibernate.cache.use_query_cache=false
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.query.fail_on_pagination_over_collection_fetch=true
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true

spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jpa.hibernate.naming.implicit-strategy=org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy

spring.messages.basename=i18n/messages

spring.main.allow-bean-definition-overriding=true

spring.mvc.problemdetails.enabled=true

spring.task.execution.thread-name-prefix=cabs-task-
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=50
spring.task.execution.pool.queue-capacity=10000

spring.task.scheduling.thread-name-prefix=cabs-scheduling-
spring.task.scheduling.pool.size=2

spring.thymeleaf.mode=HTML

spring.output.ansi.console-available=true

# =========================================================
# Server
# =========================================================
server.servlet.session.cookie.http-only=true

# =========================================================
# Springdoc
# =========================================================
springdoc.show-actuator=true

# =========================================================
# Info endpoint
# =========================================================
info.display-ribbon-on-profiles=local

# =========================================================
# JHipster
# =========================================================
jhipster.clientApp.name=cabsApp

jhipster.mail.from=cabs@localhost

jhipster.api-docs.default-include-pattern=/api/**
jhipster.api-docs.management-include-pattern=/management/**
jhipster.api-docs.title=Cabs API
jhipster.api-docs.description=Cabs API documentation
jhipster.api-docs.version=0.0.1

jhipster.security.content-security-policy=default-src 'self'; frame-src 'self' data:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://storage.googleapis.com; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com data: