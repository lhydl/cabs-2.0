version: "3.9"

services:

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_DATABASE: cabs
      MYSQL_ROOT_PASSWORD: Passw0rd12345
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    expose:
      - "8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod

  core-service:
    build:
      context: ./core-service
    container_name: core-service
    expose:
      - "8082"
    environment:
      SPRING_PROFILES_ACTIVE: prod

  appointment-service:
    build:
      context: ./appointment-service
    container_name: appointment-service
    expose:
      - "8083"
    environment:
      SPRING_PROFILES_ACTIVE: prod

  queue-service:
    build:
      context: ./queue-service
    container_name: queue-service
    expose:
      - "8084"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      
  frontend:
    build:
        context: ./frontend
    container_name: frontend
    ports:
        - "4200:80"

volumes:
  mysql_data: