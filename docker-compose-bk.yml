version: "3.9"

services:

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - core-service
      - appointment-service
      - queue-service

  core-service:
    build:
      context: ./core-service
    container_name: core-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker

  appointment-service:
    build:
      context: ./appointment-service
    container_name: appointment-service
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker

  queue-service:
    build:
      context: ./queue-service
    container_name: queue-service
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker