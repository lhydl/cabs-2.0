server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: cabs-route
              uri: http://core-service:8082
              predicates:
                - Path=/api-gateway/cabs/**
              filters:
                - StripPrefix=2

            - id: cabs-appt-route
              uri: http://appointment-service:8083
              predicates:
                - Path=/api-gateway/appt/**
              filters:
                - StripPrefix=2

            - id: cabs-queue-route
              uri: http://queue-service:8084
              predicates:
                - Path=/api-gateway/queue/**
              filters:
                - StripPrefix=2