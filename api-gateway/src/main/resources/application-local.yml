server:
  port: 8080
  servlet:
    context-path: /api-gateway

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: cabs-route
              uri: http://localhost:8082
              predicates:
                - Path=/cabs/**
              filters:
                - StripPrefix=2