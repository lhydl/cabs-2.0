<div class="service-container">
  <div class="card">
    <div class="icon">⚠️</div>

    <h1>Service Unavailable</h1>
    <p>Sorry, something went wrong on our side. The service is temporarily unavailable. Please try again in a moment.</p>

    <div class="actions">
      <button class="btn primary" (click)="retry()">Retry</button>
      <button class="btn secondary" (click)="goHome()">Back to Home</button>
    </div>
  </div>
</div>
